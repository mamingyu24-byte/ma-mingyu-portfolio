  --mm-background: var(--mm-neutral-950);
  --mm-foreground: var(--mm-neutral-100);
  --mm-card: var(--mm-neutral-900);
  --mm-card-foreground: var(--mm-neutral-100);
  --mm-popover: var(--mm-neutral-800);

  --mm-border: var(--mm-neutral-700);

  /* Radius */

  /* Typography */

  --font-body: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-5xl: 3rem;
  --text-6xl: 3.75rem;
  --text-7xl: 4.5rem;
  --text-8xl: 6rem;

  /* Line heights */
  --leading-none: 1;
  --leading-tight: 1.25;
  --leading-snug: 1.375;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  /* Font weights */
  --font-light: 300;
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* Shadows — static alpha <= 0.05, floating layers may exceed */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);

  --shadow-float: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

    <script>
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.gallery-item').forEach(function(el) { io.observe(el); });
    </script>
    <div class="scroll-progress" id="scroll-progress"></div>
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="lightbox-overlay" id="lightbox">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <button class="lightbox-arrow left" id="lb-prev" aria-label="Previous image">&#8249;</button>
      <button class="lightbox-arrow right" id="lb-next" aria-label="Next image">&#8250;</button>
      <div class="lb-img-wrap">
        <img src="" alt="Preview" id="lightbox-img" />
      </div>
      <div class="lightbox-counter" id="lb-counter"></div>
    </div>
    <script>
    (function(){
      var lb = document.getElementById('lightbox');
      var lbImg = document.getElementById('lightbox-img');
      var lbClose = document.getElementById('lightbox-close');
      var lbPrev = document.getElementById('lb-prev');
      var lbNext = document.getElementById('lb-next');
      var lbCounter = document.getElementById('lb-counter');
      var allImages = Array.from(document.querySelectorAll('.cover-wrapper img, .img-wrapper img')).map(function(i){return i.src;});
      var currentIndex = 0;
      function showImage(index) {
        currentIndex = (index + allImages.length) % allImages.length;
        lbImg.src = allImages[currentIndex];
        lbCounter.textContent = (currentIndex + 1) + ' / ' + allImages.length;
      }
      document.querySelectorAll('.cover-wrapper img, .img-wrapper img').forEach(function(img, idx) {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function() {
          currentIndex = idx;
          lbImg.src = img.src;
          lbCounter.textContent = (idx + 1) + ' / ' + allImages.length;
          lb.classList.add('active');
        });
      });
      lbPrev.addEventListener('click', function(e) { e.stopPropagation(); showImage(currentIndex - 1); });
      lbNext.addEventListener('click', function(e) { e.stopPropagation(); showImage(currentIndex + 1); });
      lb.addEventListener('click', function(e) {
        if (e.target === lb || e.target === lbClose) lb.classList.remove('active');
      });
      document.addEventListener('keydown', function(e) {
        if (!lb.classList.contains('active')) return;
        if (e.key === 'Escape') lb.classList.remove('active');
        if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
        if (e.key === 'ArrowRight') showImage(currentIndex + 1);
      });
    })();
    </script>
    <script>
    (function(){
      var cur = document.getElementById('custom-cursor');
      var cx = 0, cy = 0, tx = 0, ty = 0;
      document.addEventListener('mousemove', function(e){ tx = e.clientX; ty = e.clientY; });
      (function loop(){ cx += (tx - cx) * 0.15; cy += (ty - cy) * 0.15; cur.style.left = cx + 'px'; cur.style.top = cy + 'px'; requestAnimationFrame(loop); })();
      document.querySelectorAll('a, button, .img-wrapper, .cover-wrapper, [data-icon]').forEach(function(el){
        el.addEventListener('mouseenter', function(){ cur.classList.add('hovering'); });
        el.addEventListener('mouseleave', function(){ cur.classList.remove('hovering'); });
      });
      var coverImg = document.querySelector('.cover-wrapper img');
      var h1 = document.querySelector('.page-slot h1');
      if (coverImg) {
        if (coverImg.complete && coverImg.naturalWidth) { coverImg.classList.add('loaded'); }
        else { coverImg.addEventListener('load', function(){ coverImg.classList.add('loaded'); }); }
      }
      if (h1) { setTimeout(function(){ h1.classList.add('revealed'); }, 200); }
      document.querySelectorAll('.gallery-item .img-wrapper').forEach(function(wrap) {
        var overlay = document.createElement('div');
        overlay.className = 'curtain-overlay';
        wrap.appendChild(overlay);
      });
      var curtainIO = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            var idx = Array.from(document.querySelectorAll('.gallery-item')).indexOf(e.target);
            setTimeout(function(){ e.target.classList.add('wiped'); }, idx * 100);
            curtainIO.unobserve(e.target);
          }
        });
      }, { threshold: 0.15 });
      document.querySelectorAll('.gallery-item').forEach(function(el) { curtainIO.observe(el); });
      var bar = document.getElementById('scroll-progress');
      window.addEventListener('scroll', function() {
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        bar.style.width = docHeight > 0 ? (scrollTop / docHeight * 100) + '%' : '0%';
      });
    })();
    </script>
