<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Mingyu - Design Portfolio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#0a0a0a;
  font-family:system-ui,-apple-system,sans-serif;
  color:#f2f0e8;
  -webkit-font-smoothing:antialiased;
}

/* ── Spiral Container ── */
.spiral-viewport{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  perspective:1200px;
  perspective-origin:50% 50%;
}
.spiral-scene{
  position:relative;
  width:1px;height:1px;
  transform-style:preserve-3d;
  will-change:transform;
}

/* ── Card wrapper (handles 3D positioning) ── */
.card-slot{
  position:absolute;
  transform-style:preserve-3d;
  backface-visibility:hidden;
  left:0;top:0;
  display:flex;align-items:center;justify-content:center;
}

/* ── Card visual (handles sizing, opacity, scale) ── */
.spiral-card{
  border-radius:16px;
  overflow:hidden;
  will-change:transform,opacity;
  cursor:default;
  border:1px solid rgba(156,255,63,0.1);
  transition:box-shadow 0.4s ease;
  position:relative;
  /* entry start state */
  opacity:0;
  transform:scale(0.3);
}
.spiral-card img{
  width:100%;height:100%;object-fit:cover;
  display:block;
  pointer-events:none;
}
.spiral-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,10,10,0.55) 0%,transparent 50%);
  border-radius:16px;pointer-events:none;
}
.spiral-card.front-glow{
  box-shadow:0 0 40px rgba(156,255,63,0.2);
}

/* ── Center watermark ── */
.center-name{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:36px;font-weight:300;
  color:rgba(242,240,232,0.15);
  pointer-events:none;
  user-select:none;
  letter-spacing:8px;
  z-index:1;
}

/* ── Enter button ── */
.enter-btn{
  position:fixed;right:40px;top:50%;
  transform:translateY(-50%);
  background:rgba(156,255,63,0.08);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(156,255,63,0.2);
  border-radius:50px;
  padding:16px 32px;
  color:#9cff3f;
  font-size:14px;font-weight:500;
  letter-spacing:1px;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
  z-index:10;
  opacity:0;
  animation:btnFadeIn 0.8s 1.5s cubic-bezier(0.16,1,0.3,1) forwards, breatheBorder 3s 2.3s ease-in-out infinite;
  transition:background 0.3s ease,border-color 0.3s ease,box-shadow 0.3s ease;
  white-space:nowrap;
}
.enter-btn:hover{
  background:rgba(156,255,63,0.15);
  border-color:rgba(156,255,63,0.4);
  box-shadow:0 0 30px rgba(156,255,63,0.1);
}
@keyframes btnFadeIn{
  from{opacity:0;transform:translateY(-50%) translateX(20px)}
  to{opacity:1;transform:translateY(-50%) translateX(0)}
}
@keyframes breatheBorder{
  0%,100%{border-color:rgba(156,255,63,0.2)}
  50%{border-color:rgba(156,255,63,0.4)}
}

/* ── Particles ── */
.particle{
  position:fixed;
  border-radius:50%;
  background:#9cff3f;
  pointer-events:none;
  z-index:0;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:var(--p-opacity)}
  90%{opacity:var(--p-opacity)}
  100%{transform:translateY(-10vh) translateX(var(--sway));opacity:0}
}

/* ── Mobile ── */
@media(max-width:768px){
  .center-name{font-size:24px;letter-spacing:4px}
  .enter-btn{
    right:auto;bottom:40px;left:50%;
    top:auto;
    transform:translateX(-50%);
    animation:btnFadeInMobile 0.8s 1.5s cubic-bezier(0.16,1,0.3,1) forwards, breatheBorder 3s 2.3s ease-in-out infinite;
  }
  @keyframes btnFadeInMobile{
    from{opacity:0;transform:translateX(-50%) translateY(20px)}
    to{opacity:1;transform:translateX(-50%) translateY(0)}
  }
}
</style>
</head>
<body>

<div class="spiral-viewport">
  <div class="spiral-scene" id="spiralScene"></div>
</div>

<div class="center-name">马明宇</div>

<a href="home.html" class="enter-btn">进入主页 →</a>

<script>
(function(){
  /* ── Image sources ── */
  const IMAGE_URLS = [
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/miao-culture.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/ip-yun-jian.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/xfun-web-ui.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/font-design.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/packaging-design.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/brand-identity.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/photography.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/book-exhibition.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/wayfinding-design.jpg',
    'https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/ip-yapu.jpg'
  ];

  const TOTAL = 30;
  const isMobile = window.innerWidth < 768;
  const BASE_R = isMobile ? 280 : 450;
  const AMP_R  = isMobile ? 100 : 150;
  const CARD_W = isMobile ? 140 : 200;
  const CARD_H = isMobile ? 98  : 140;

  const scene = document.getElementById('spiralScene');
  const cards = [];

  /* ── Create 30 card-slot + spiral-card pairs ── */
  for (let i = 0; i < TOTAL; i++) {
    const angleDeg = (360 / TOTAL) * i;
    /* sinusoidal radius for spiral depth */
    const radius = BASE_R + AMP_R * Math.sin((i / TOTAL) * Math.PI * 2 * 1.5);
    const yOff = (isMobile ? 15 : 25) * Math.sin((i / TOTAL) * Math.PI * 2 * 1.5);

    /* wrapper: handles 3D position (rotateY + translateZ + translateY) */
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.style.transform =
      'rotateY(' + angleDeg + 'deg) translateZ(' + radius + 'px) translateY(' + yOff + 'px)';

    /* visual card: handles width, height, opacity, scale */
    const card = document.createElement('div');
    card.className = 'spiral-card';
    card.style.width = CARD_W + 'px';
    card.style.height = CARD_H + 'px';

    const img = document.createElement('img');
    img.src = IMAGE_URLS[i % IMAGE_URLS.length];
    img.alt = '';
    img.draggable = false;

    card.appendChild(img);
    slot.appendChild(card);
    scene.appendChild(slot);

    cards.push({
      slot: slot,
      card: card,
      angleDeg: angleDeg,
      radius: radius,
      /* entry animation state */
      entryProgress: 0,
      entryDelay: i * 30   /* staggered 30ms */
    });
  }

  /* ── Particles ── */
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 2;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = (10 + Math.random() * 80) + 'vw';
    p.style.setProperty('--p-opacity', (0.1 + Math.random() * 0.15).toFixed(2));
    p.style.setProperty('--sway', ((Math.random() - 0.5) * 60) + 'px');
    p.style.animationDuration = (12 + Math.random() * 18) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(p);
  }

  /* ── Animation state ── */
  let rotation = 0;
  const BASE_SPEED = 0.12;
  let mouseInfluence = 0;
  let targetMouseInfluence = 0;

  /* ── Mouse / touch ── */
  function onPointerMove(x) {
    const cx = window.innerWidth / 2;
    targetMouseInfluence = ((x - cx) / cx) * 0.3;
    resetAutoRedirect();
  }
  document.addEventListener('mousemove', function(e){ onPointerMove(e.clientX); });
  document.addEventListener('touchmove', function(e){
    if (e.touches.length) onPointerMove(e.touches[0].clientX);
  }, { passive: true });

  /* ── Auto redirect (20s) ── */
  let autoTimer = null;
  function resetAutoRedirect() {
    clearTimeout(autoTimer);
    autoTimer = setTimeout(function(){ window.location.href = 'home.html'; }, 20000);
  }
  document.addEventListener('mousemove', resetAutoRedirect);
  document.addEventListener('touchstart', resetAutoRedirect);
  document.addEventListener('click', resetAutoRedirect);
  resetAutoRedirect();

  /* ── Cubic bezier approximation for spring-like easing ── */
  function springEase(t) {
    /* cubic-bezier(0.16, 1, 0.3, 1) approximation */
    return 1 - Math.pow(1 - t, 3);
  }

  /* ── Main loop ── */
  let startTime = null;
  const ENTRY_DURATION = 700; /* ms per card entry */

  function tick(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;

    /* smooth mouse influence */
    mouseInfluence += (targetMouseInfluence - mouseInfluence) * 0.05;
    rotation += BASE_SPEED + mouseInfluence;

    /* rotate entire scene */
    scene.style.transform = 'rotateY(' + rotation + 'deg)';

    for (let i = 0; i < cards.length; i++) {
      const c = cards[i];

      /* ── Entry animation ── */
      const cardElapsed = elapsed - c.entryDelay;
      if (cardElapsed < 0) {
        c.card.style.opacity = '0';
        c.card.style.transform = 'scale(0.3)';
        continue;
      }
      const entryT = Math.min(1, cardElapsed / ENTRY_DURATION);
      const easedT = springEase(entryT);

      /* ── Depth-based properties ── */
      const deg = ((c.angleDeg + rotation) % 360 + 360) % 360;
      const facing = Math.abs(deg - 180);  /* 0 = front, 180 = back */
      const t = facing / 180;              /* 0 = front, 1 = back */

      const depthScale = 1 - t * 0.5;      /* 1 → 0.5 */
      const depthOpacity = 1 - t * 0.8;    /* 1 → 0.2 */

      /* combine entry + depth */
      const finalScale = easedT * depthScale;
      const finalOpacity = easedT * Math.max(0.08, depthOpacity);

      c.card.style.transform = 'scale(' + finalScale + ')';
      c.card.style.opacity = finalOpacity;

      /* dynamic width/height for depth sizing */
      const w = CARD_W * depthScale;
      const h = CARD_H * depthScale;
      c.card.style.width = w + 'px';
      c.card.style.height = h + 'px';

      /* front glow on nearest card */
      if (t < 0.15 && entryT >= 1) {
        c.card.classList.add('front-glow');
      } else {
        c.card.classList.remove('front-glow');
      }
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

})();
</script>
</body>
</html>
