<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第16届书籍展览</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;}
body{background:#000;color:#f2f0e8;font-family:'Urbanist','Noto Sans SC',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
img{display:block;width:100%;height:auto;}
.sp{position:fixed;top:0;left:0;height:2px;background:#9cff3f;z-index:200;width:0;transition:width .05s linear;}
nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(0,0,0,0.42);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;max-width:100%;}
nav .logo{font-size:1.125rem;font-weight:600;color:#f2f0e8;letter-spacing:-0.02em;}
nav .nav-links{display:flex;gap:32px;}
nav .nav-links a{font-size:.875rem;font-weight:500;color:#a1a1ab;transition:color .3s;}
nav .nav-links a:hover{color:#f2f0e8;}
nav .nav-links a.active{color:#9cff3f;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;z-index:150;}
.hamburger span{display:block;width:22px;height:2px;background:#f2f0e8;border-radius:100px;transition:all .3s;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-overlay{position:fixed;inset:0;background:#000;z-index:140;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;pointer-events:none;transition:opacity .3s;}
.mobile-overlay.open{opacity:1;pointer-events:auto;}
.mobile-overlay a{font-size:2rem;font-weight:600;color:#f2f0e8;opacity:0;transform:translateY(20px);transition:all .4s ease;}
.mobile-overlay.open a{opacity:1;transform:translateY(0);}
.mobile-overlay.open a:nth-child(1){transition-delay:.05s;}
.mobile-overlay.open a:nth-child(2){transition-delay:.1s;}
.mobile-overlay.open a:nth-child(3){transition-delay:.15s;}
.mobile-overlay a.active{color:#9cff3f;}
.detail{max-width:900px;margin:0 auto;padding:100px 24px 60px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.875rem;color:#a1a1ab;transition:color .3s;}
.back-link:hover{color:#9cff3f;}
.back-link .arrow{transition:transform .3s;}
.back-link:hover .arrow{transform:translateX(-4px);}
.detail h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:600;color:#f2f0e8;letter-spacing:-0.03em;margin:16px 0 12px;line-height:1.2;}
.tag{display:inline-block;border:1px solid #9cff3f;color:#9cff3f;font-size:12px;font-weight:500;border-radius:100px;padding:4px 14px;text-transform:uppercase;letter-spacing:.04em;}
.cover{border-radius:24px;overflow:hidden;margin-top:32px;transition:transform .3s;}
.cover:hover{transform:scale(1.02);}
.gallery{display:flex;flex-direction:column;gap:24px;margin-top:32px;}
.gallery-item{border-radius:24px;overflow:hidden;transition:transform .3s;}
.gallery-item:hover{transform:scale(1.015);}
.bottom-back{text-align:center;margin-top:64px;}
footer{border-top:1px solid rgba(255,255,255,0.1);text-align:center;padding:32px 24px;color:rgba(255,255,255,0.3);font-size:13px;}
footer a{color:rgba(255,255,255,0.3);transition:color .3s;}
footer a:hover{color:#9cff3f;}
.lb{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:12px;}
.lb-close{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lb-close:hover{background:rgba(255,255,255,0.2);}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lb-arrow:hover{background:rgba(255,255,255,0.2);}
.lb-arrow.left{left:20px;}
.lb-arrow.right{right:20px;}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:.875rem;letter-spacing:.05em;}
.anim-section{opacity:0;transform:translateY(40px);transition:opacity .6s ease,transform .6s ease;}
.is-visible{opacity:1;transform:translateY(0);}
@media(max-width:639px){.hamburger{display:flex;}nav .nav-links{display:none;}.detail{padding:80px 16px 40px;}}
</style>
</head>
<body>
<div class="sp" id="sp"></div>
<nav>
<a href="home.html" class="logo">马明宇</a>
<div class="nav-links">
<a href="home.html">首页</a>
<a href="works.html" class="active">作品集</a>
<a href="about.html">关于我</a>
</div>
<div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>
<div class="mobile-overlay" id="mobileMenu">
<a href="home.html">首页</a>
<a href="works.html" class="active">作品集</a>
<a href="about.html">关于我</a>
</div>
<section class="detail">
<div class="anim-section">
<a href="works.html" class="back-link"><span class="arrow">&#8592;</span> 返回作品集</a>
<h1>第16届书籍展览</h1>
<span class="tag">展览设计</span>
</div>
<div class="cover anim-section">
<img src="https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/book-exhibition.jpg" alt="第16届书籍展览" loading="lazy">
</div>
<div class="gallery">
<div class="gallery-item anim-section">
<img src="https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/book-exhibition-1.jpg" alt="第16届书籍展览" loading="lazy">
</div>
</div>
<div class="bottom-back anim-section">
<a href="works.html" class="back-link"><span class="arrow">&#8592;</span> 返回作品集</a>
</div>
</section>
<footer>
<p>&copy; 2025-2026 马明宇 All Rights Reserved | <a href="mailto:2536260106@stu.zjhzcc.edu.cn">2536260106@stu.zjhzcc.edu.cn</a></p>
</footer>
<div class="lb" id="lb">
<button class="lb-close" id="lbClose">&times;</button>
<button class="lb-arrow left" id="lbPrev" aria-label="上一张">&#8249;</button>
<button class="lb-arrow right" id="lbNext" aria-label="下一张">&#8250;</button>
<img loading="lazy" src="" alt="预览" id="lbImg">
<div class="lb-counter" id="lbCounter"></div>
</div>
<script>
(function(){
var sp=document.getElementById('sp');
window.addEventListener('scroll',function(){var t=window.pageYOffset,d=document.documentElement.scrollHeight-document.documentElement.clientHeight;sp.style.width=d>0?(t/d*100)+'%':'0%';});
var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('is-visible');io.unobserve(e.target);}});},{threshold:0.1});
document.querySelectorAll('.anim-section').forEach(function(el){io.observe(el);});
var hb=document.getElementById('hamburger'),mo=document.getElementById('mobileMenu');
hb.addEventListener('click',function(){hb.classList.toggle('open');mo.classList.toggle('open');document.body.style.overflow=mo.classList.contains('open')?'hidden':'';});
mo.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){hb.classList.remove('open');mo.classList.remove('open');document.body.style.overflow='';});});
var lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbClose=document.getElementById('lbClose'),lbPrev=document.getElementById('lbPrev'),lbNext=document.getElementById('lbNext'),lbCounter=document.getElementById('lbCounter');
var allImgs=Array.from(document.querySelectorAll('.cover img,.gallery-item img')).map(function(i){return i.src;});
var ci=0;
function showImg(i){ci=(i+allImgs.length)%allImgs.length;lbImg.src=allImgs[ci];lbCounter.textContent=(ci+1)+' / '+allImgs.length;}
document.querySelectorAll('.cover img,.gallery-item img').forEach(function(img,idx){img.style.cursor='zoom-in';img.addEventListener('click',function(){ci=idx;lbImg.src=img.src;lbCounter.textContent=(idx+1)+' / '+allImgs.length;lb.classList.add('open');});});
lbPrev.addEventListener('click',function(e){e.stopPropagation();showImg(ci-1);});
lbNext.addEventListener('click',function(e){e.stopPropagation();showImg(ci+1);});
lb.addEventListener('click',function(e){if(e.target===lb||e.target===lbClose)lb.classList.remove('open');});
document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')lb.classList.remove('open');if(e.key==='ArrowLeft')showImg(ci-1);if(e.key==='ArrowRight')showImg(ci+1);});
})();
</script>
</body>
</html>
