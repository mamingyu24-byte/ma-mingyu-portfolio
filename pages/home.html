    <style id="theme-vars">
:root {
  /* === mm brand tokens === */

  /* Primary hue — electric cyan */
  --mm-primary-50: #e6faff;
  --mm-primary-100: #b3f0ff;
  --mm-primary-200: #80e6ff;
  --mm-primary-300: #4ddcff;
  --mm-primary-400: #1ad2ff;
  --mm-primary-500: #00c8ff;
  --mm-primary-600: #009ecc;
  --mm-primary-700: #007499;
  --mm-primary-800: #004a66;
  --mm-primary-900: #002133;

  /* Neutral scale — cool gray */
  --mm-neutral-50: #f4f4f8;
  --mm-neutral-100: #e4e4ec;
  --mm-neutral-200: #c8c8d6;
  --mm-neutral-300: #a0a0b8;
  --mm-neutral-400: #7a7a96;
  --mm-neutral-500: #5c5c78;
  --mm-neutral-600: #444460;
  --mm-neutral-700: #2e2e48;
  --mm-neutral-800: #1e1e34;
  --mm-neutral-900: #12122a;
  --mm-neutral-950: #08080d;

  /* State colors */
  --state-success: #22c55e;
  --state-warning: #f59e0b;
  --state-error: #ef4444;
  --state-info: #00c8ff;

  /* Semantic aliases (required by fill-html-head.mjs) */
  --mm-background: var(--mm-neutral-950);
  --mm-foreground: var(--mm-neutral-100);
  --mm-card: var(--mm-neutral-900);
  --mm-card-foreground: var(--mm-neutral-100);
  --mm-popover: var(--mm-neutral-800);
  --mm-popover-foreground: var(--mm-neutral-100);
  --mm-primary: var(--mm-primary-500);
  --mm-primary-foreground: var(--mm-neutral-950);
  --mm-muted: var(--mm-neutral-800);
  --mm-muted-foreground: var(--mm-neutral-400);
  --mm-border: var(--mm-neutral-700);
  --mm-input: var(--mm-neutral-800);
  --mm-ring: var(--mm-primary-500);

  /* Radius */
  --mm-radius-sm: 4px;
  --mm-radius-md: 8px;
  --mm-radius-lg: 16px;
  --mm-radius-full: 9999px;

  /* Typography */
  --font-heading: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-body: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Type scale */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-5xl: 3rem;
  --text-6xl: 3.75rem;
  --text-7xl: 4.5rem;
  --text-8xl: 6rem;

  /* Line heights */
  --leading-none: 1;
  --leading-tight: 1.25;
  --leading-snug: 1.375;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  /* Font weights */
  --font-light: 300;
  --font-normal: 400;
  --font-medium: 500;
  --font-semibold: 600;
  --font-bold: 700;

  /* Shadows — static alpha <= 0.05, floating layers may exceed */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

.dark {
  --mm-background: var(--mm-neutral-950);
  --mm-foreground: var(--mm-neutral-100);
  --mm-card: var(--mm-neutral-900);
  --mm-card-foreground: var(--mm-neutral-100);
  --mm-popover: var(--mm-neutral-800);
  --mm-popover-foreground: var(--mm-neutral-100);
  --mm-primary: var(--mm-primary-500);
  --mm-primary-foreground: var(--mm-neutral-950);
  --mm-muted: var(--mm-neutral-800);
  --mm-muted-foreground: var(--mm-neutral-400);
  --mm-border: var(--mm-neutral-700);
  --mm-input: var(--mm-neutral-800);
  --mm-ring: var(--mm-primary-500);
}

<style>
  /* ---- Hero entrance animations ---- */
  @keyframes hero-fade-up {
    0% { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes hero-fade-up-delay-1 {
    0% { opacity: 0; transform: translateY(40px); }
    30% { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes hero-fade-up-delay-2 {
    0% { opacity: 0; transform: translateY(40px); }
    45% { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes hero-fade-up-delay-3 {
    0% { opacity: 0; transform: translateY(40px); }
    60% { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* BUG FIX #1: Gradient moved to .hero-name .char-reveal span, removed from .hero-name */
  .hero-name {
    animation: hero-fade-up 0.8s ease-out both;
  }
  .hero-name .char-reveal span {
    background: linear-gradient(135deg, var(--mm-primary-400, #1ad2ff), var(--mm-primary-500, #00c8ff), var(--mm-primary-200, #80e6ff));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-subtitle {
    animation: hero-fade-up-delay-1 1.2s ease-out both;
  }
  .hero-tagline {
    animation: hero-fade-up-delay-2 1.5s ease-out both;
  }
  .hero-divider {
    animation: hero-fade-up-delay-3 1.8s ease-out both;
  }

  /* ---- Editorial project cards (replaces glass-card for works grid) ---- */
  .editorial-card {
    position: relative;
    overflow: hidden;
    border-radius: var(--mm-radius-lg, 16px);
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .editorial-card .card-cover {
    overflow: hidden;
    width: 100%;
  }
  .editorial-card .card-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease-out;
  }
  .editorial-card:hover .card-cover img {
    transform: scale(1.04);
  }
  .editorial-card .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(8, 8, 13, 0.85) 0%, rgba(8, 8, 13, 0.2) 50%, transparent 100%);
    transition: background 0.5s ease-out;
    pointer-events: none;
  }
  .editorial-card:hover .card-overlay {
    background: linear-gradient(to top, rgba(8, 8, 13, 0.92) 0%, rgba(8, 8, 13, 0.35) 50%, transparent 100%);
  }
  .editorial-card .card-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2rem;
    z-index: 2;
    transform: translateY(8px);
    transition: transform 0.5s ease-out;
  }
  .editorial-card:hover .card-info {
    transform: translateY(0);
  }

  /* ---- Skills pill (editorial, no float) ---- */
  .skill-pill-editorial {
    white-space: nowrap;
    padding: 0.5rem 1.25rem;
    border-radius: var(--mm-radius-full, 9999px);
    border: 1px solid var(--mm-border, #2e2e48);
    color: var(--mm-muted-foreground, #7a7a96);
    font-size: var(--text-sm, 0.875rem);
    font-weight: var(--font-medium, 500);
    letter-spacing: 0.02em;
    transition: all 0.4s ease-out;
  }
  .skill-pill-editorial:hover {
    border-color: var(--mm-primary-500, #00c8ff);
    color: var(--mm-primary-500, #00c8ff);
    box-shadow: 0 0 20px rgba(0, 200, 255, 0.12);
  }

  /* ---- Section heading with cyan dot ---- */
  .section-heading-editorial {
    color: var(--mm-foreground, #e4e4ec);
    font-family: var(--font-heading);
    font-weight: var(--font-bold, 700);
    font-size: clamp(var(--text-3xl, 1.875rem), 4vw, var(--text-5xl, 3rem));
    text-wrap: balance;
    word-break: keep-all;
    overflow-wrap: break-word;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-heading-editorial::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    background: var(--mm-primary, #00c8ff);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
  }

  /* ---- CTA link (editorial style) ---- */
  .cta-link-editorial {
    color: var(--mm-muted-foreground, #7a7a96);
    font-size: var(--text-lg, 1.125rem);
    font-weight: var(--font-medium, 500);
    text-decoration: none;
    transition: all 0.4s ease-out;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .cta-link-editorial:hover {
    color: var(--mm-primary, #00c8ff);
    gap: 0.75rem;
  }

  /* ---- CTA section (contact) ---- */
  .contact-cta-heading {
    color: var(--mm-foreground, #e4e4ec);
    font-family: var(--font-heading);
    font-weight: var(--font-bold, 700);
    font-size: clamp(var(--text-4xl, 2.25rem), 6vw, var(--text-7xl, 4.5rem));
    line-height: var(--leading-tight, 1.25);
    text-wrap: balance;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .contact-email {
    color: var(--mm-muted-foreground, #7a7a96);
    font-size: var(--text-lg, 1.125rem);
    font-weight: var(--font-normal, 400);
    text-decoration: none;
    transition: color 0.4s ease-out;
  }
  .contact-email:hover {
    color: var(--mm-primary, #00c8ff);
  }

  /* ============================================
     ENHANCEMENT 1 — Magnetic custom cursor
     ============================================ */
  .cursor-dot {
    position: fixed;
    top: 0;
    left: 0;
    width: 8px;
    height: 8px;
    background: var(--mm-primary, #00c8ff);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: width 0.35s cubic-bezier(0.23, 1, 0.32, 1),
                height 0.35s cubic-bezier(0.23, 1, 0.32, 1),
                background-color 0.35s ease,
                opacity 0.35s ease;
    mix-blend-mode: screen;
    will-change: transform, width, height;
  }
  .cursor-dot.hovering {
    width: 40px;
    height: 40px;
    opacity: 0.18;
    background: var(--mm-primary, #00c8ff);
  }
  @media (pointer: coarse) {
    .cursor-dot { display: none; }
  }

  /* ============================================
     ENHANCEMENT 2 — Hero text character reveal
     ============================================ */
  .hero-name .char-reveal {
    display: inline-block;
    overflow: hidden;
    vertical-align: baseline;
  }
  .hero-name .char-reveal span {
    display: inline-block;
    transform: translateY(105%);
    animation: char-slide-up 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }
  @keyframes char-slide-up {
    to { transform: translateY(0); }
  }

  /* ============================================
     ENHANCEMENT 6 — Section entrance animations
     ============================================ */
  .anim-section {
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.7s cubic-bezier(0.23, 1, 0.32, 1),
                transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .anim-section.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  .anim-child {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.55s cubic-bezier(0.23, 1, 0.32, 1),
                transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .anim-child.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ============================================
     ENHANCEMENT 7 — Particle canvas
     ============================================ */
  #particles-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ============================================
     Reduced-motion overrides for enhancements
     ============================================ */
  @media (prefers-reduced-motion: reduce) {
    .cursor-dot { display: none !important; }
    .hero-name .char-reveal span { animation: none !important; transform: none !important; }
    .hero-name, .hero-subtitle, .hero-tagline, .hero-divider {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    .anim-section, .anim-child {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
    .editorial-card .card-cover img,
    .editorial-card .card-overlay,
    .editorial-card .card-info {
      transition: none !important;
    }
    #particles-canvas { display: none !important; }
  }
</style>

<!-- ============ SHARED PROJECT SHELL ============ -->
<style>
  /* ---- animated gradient mesh background ---- */
  @keyframes mesh-drift {
    0%, 100% {
      background-position: 0% 0%, 100% 100%, 50% 50%;
    }
    25% {
      background-position: 60% 20%, 30% 80%, 80% 40%;
    }
    50% {
      background-position: 100% 50%, 0% 30%, 20% 80%;
    }
    75% {
      background-position: 40% 80%, 70% 10%, 60% 20%;
    }
  }

  .portfolio-bg {
    background-color: var(--mm-background, #08080d);
    background-image:
      radial-gradient(ellipse 600px 600px at 20% 20%, rgba(0, 200, 255, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 60%, rgba(0, 120, 255, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 400px at 50% 90%, rgba(0, 200, 255, 0.04) 0%, transparent 70%);
    background-size: 200% 200%, 200% 200%, 200% 200%;
    animation: mesh-drift 20s ease-in-out infinite;
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--mm-foreground);
  }

  /* ---- nav glass effect ---- */
  .nav-glass {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(8, 8, 13, 0.7);
    border-bottom: 1px solid var(--mm-border, #2e2e48);
    transition: all 0.3s ease;
  }

  /* ---- nav link base ---- */
  .nav-link {
    color: var(--mm-muted-foreground, #7a7a96);
    transition: all 0.3s ease;
    font-size: var(--text-sm, 0.875rem);
    font-weight: var(--font-medium, 500);
    letter-spacing: 0.02em;
    padding: 0.5rem 0;
    position: relative;
  }
  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--mm-primary, #00c8ff);
    border-radius: var(--mm-radius-full, 9999px);
    transition: width 0.3s ease;
  }
  .nav-link:hover {
    color: var(--mm-foreground, #e4e4ec);
  }
  .nav-link:hover::after {
    width: 100%;
  }

  /* ---- active nav link ---- */
  .nav-link[data-active="true"] {
    color: var(--mm-primary, #00c8ff);
  }
  .nav-link[data-active="true"]::after {
    width: 100%;
    background: var(--mm-primary, #00c8ff);
  }

  /* ---- logo dot accent ---- */
  .logo-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--mm-primary, #00c8ff);
    border-radius: 50%;
    margin-left: 2px;
    vertical-align: super;
    font-size: 0;
    box-shadow: 0 0 8px rgba(0, 200, 255, 0.5);
  }

  /* ---- footer ---- */
  .portfolio-footer {
    border-top: 1px solid var(--mm-border, #2e2e48);
    color: var(--mm-muted-foreground, #7a7a96);
    font-size: var(--text-sm, 0.875rem);
    transition: all 0.3s ease;
  }
  .portfolio-footer a {
    color: var(--mm-muted-foreground, #7a7a96);
    transition: color 0.3s ease;
    text-decoration: none;
  }
  .portfolio-footer a:hover {
    color: var(--mm-primary, #00c8ff);
  }

  /* ---- mobile hamburger (CSS-only checkbox hack) ---- */
  .mobile-menu-toggle {
    display: none;
  }
  .hamburger-label {
    display: none;
    cursor: pointer;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
  }
  .hamburger-label span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--mm-foreground, #e4e4ec);
    border-radius: var(--mm-radius-full, 9999px);
    transition: all 0.3s ease;
  }

  @media (max-width: 639px) {
    .hero-name {

<script>
(function() {
  'use strict';

  /* ====== Reduced-motion guard ====== */
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* =========================================================
     1. MAGNETIC CUSTOM CURSOR
     ========================================================= */
  if (!prefersReduced && window.matchMedia('(pointer: fine)').matches) {
    var cursor = document.createElement('div');
    cursor.className = 'cursor-dot';
    document.body.appendChild(cursor);

    var cursorX = 0, cursorY = 0;
    var dotX = 0, dotY = 0;
    var isHovering = false;

    document.addEventListener('mousemove', function(e) {
      cursorX = e.clientX;
      cursorY = e.clientY;
    });

    function animateCursor() {
      dotX += (cursorX - dotX) * 0.15;
      dotY += (cursorY - dotY) * 0.15;
      cursor.style.left = dotX + 'px';
      cursor.style.top = dotY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    /* Scale up on interactive elements */
    var hoverTargets = document.querySelectorAll('a, button, .editorial-card, .cta-link-editorial, .skill-pill-editorial, .nav-link');
    hoverTargets.forEach(function(el) {
      el.addEventListener('mouseenter', function() {
        cursor.classList.add('hovering');
      });
      el.addEventListener('mouseleave', function() {
        cursor.classList.remove('hovering');
      });
    });
  }

  /* =========================================================
     2. TEXT REVEAL ANIMATION — character-by-character
     ========================================================= */
  var heroNameEl = document.getElementById('hero-name');
  if (heroNameEl) {
    var text = '马明宇';
    var html = '';
    for (var i = 0; i < text.length; i++) {
      html += '<span class="char-reveal"><span style="animation-delay:' + (0.15 + i * 0.12) + 's">' + text[i] + '</span></span>';
    }
    heroNameEl.innerHTML = html;
  }

  /* =========================================================
     3. PARALLAX SCROLLING — hero title & subtitle
     ========================================================= */
  if (!prefersReduced) {
    var heroTitle = document.getElementById('hero-name');
    var heroSubtitle = document.getElementById('hero-subtitle');
    var ticking = false;

    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          var scrollY = window.pageYOffset || window.scrollY;
          if (heroTitle) heroTitle.style.transform = 'translateY(' + (scrollY * -0.2) + 'px)';
          if (heroSubtitle) heroSubtitle.style.transform = 'translateY(' + (scrollY * -0.4) + 'px)';
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  }

  /* =========================================================
     6. SECTION ENTRANCE ANIMATIONS (IntersectionObserver)
     ========================================================= */
  if (!prefersReduced) {
    var sections = document.querySelectorAll('.anim-section');
    var children = document.querySelectorAll('.anim-child');

    /* Observe sections first */
    var sectionObs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          /* Now stagger children inside */
          var kids = entry.target.querySelectorAll('.anim-child');
          kids.forEach(function(child, idx) {
            setTimeout(function() {
              child.classList.add('is-visible');
            }, idx * 120);
          });
          sectionObs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    sections.forEach(function(sec) { sectionObs.observe(sec); });
  }

  /* =========================================================
     7. FLOATING PARTICLES (Canvas)
     ========================================================= */
  if (!prefersReduced) {
    var canvas = document.getElementById('particles-canvas');
    if (canvas) {
      var ctx = canvas.getContext('2d');
      var particles = [];
      var particleCount = 18;

      function resizeCanvas() {
        var hero = document.getElementById('hero');
        if (hero) {
          canvas.width = hero.offsetWidth;
          canvas.height = hero.offsetHeight;
        }
      }

      function createParticle() {
        return {
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2.5 + 1.5,
          speedX: (Math.random() - 0.5) * 0.3,
          speedY: (Math.random() - 0.5) * 0.3,
          opacity: Math.random() * 0.25 + 0.08
        };
      }

      function initParticles() {
        particles = [];
        for (var i = 0; i < particleCount; i++) {
          particles.push(createParticle());
        }
      }

      function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 200, 255, ' + p.opacity + ')';
          ctx.fill();

          p.x += p.speedX;
          p.y += p.speedY;

          /* Wrap around edges */
          if (p.x < -10) p.x = canvas.width + 10;
          if (p.x > canvas.width + 10) p.x = -10;
          if (p.y < -10) p.y = canvas.height + 10;
          if (p.y > canvas.height + 10) p.y = -10;
        }
        requestAnimationFrame(drawParticles);
      }

      resizeCanvas();
      initParticles();
      drawParticles();

      window.addEventListener('resize', function() {
        resizeCanvas();
        initParticles();
      });
    }
  }

})();
</script>
