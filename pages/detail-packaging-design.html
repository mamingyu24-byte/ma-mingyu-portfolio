<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>包装设计</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{background:#000000;color:#f2f0e8;font-family:'Urbanist','Noto Sans SC',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;height:auto;}
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:#9cff3f;z-index:200;width:0%;transition:width 0.05s linear;}
nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(0,0,0,0.42);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;max-width:100%;}
.nav-logo{font-size:1.125rem;font-weight:600;color:#f2f0e8;letter-spacing:-0.02em;}
.nav-links{display:flex;gap:32px;align-items:center;}
.nav-links a{font-size:0.875rem;font-weight:500;color:#a1a1ab;transition:color 0.3s;}
.nav-links a:hover{color:#f2f0e8;}
.nav-links a.active{color:#9cff3f;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;z-index:110;}
.hamburger span{display:block;width:22px;height:2px;background:#f2f0e8;border-radius:100px;transition:all 0.3s;}
.hamburger.is-open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.is-open span:nth-child(2){opacity:0;}
.hamburger.is-open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-menu{position:fixed;inset:0;background:#000000;z-index:105;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.mobile-menu.is-open{opacity:1;pointer-events:all;}
.mobile-menu a{font-size:2rem;font-weight:600;color:#f2f0e8;transition:color 0.3s;}
.mobile-menu a:hover{color:#9cff3f;}
.mobile-menu a.active{color:#9cff3f;}
@media(max-width:639px){.nav-links{display:none;}.hamburger{display:flex;}}
.detail{max-width:900px;margin:0 auto;padding:100px 24px 60px;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#a1a1ab;font-size:0.875rem;font-weight:500;transition:color 0.3s;}
.back-link:hover{color:#9cff3f;}
.back-link .arrow{display:inline-block;transition:transform 0.3s;}
.back-link:hover .arrow{transform:translateX(-4px);}
.detail h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:600;color:#f2f0e8;letter-spacing:-0.03em;margin-top:24px;line-height:1.2;}
.tag-pill{display:inline-block;border:1px solid #9cff3f;color:#9cff3f;font-size:12px;font-weight:500;text-transform:uppercase;border-radius:100px;padding:4px 14px;margin-top:16px;letter-spacing:0.05em;}
.cover{margin-top:32px;border-radius:24px;overflow:hidden;transition:transform 0.4s;}
.cover:hover{transform:scale(1.02);}
.cover img{width:100%;height:auto;display:block;}
.gallery{display:flex;flex-direction:column;gap:24px;margin-top:40px;}
.gallery-item{border-radius:24px;overflow:hidden;transition:transform 0.4s;opacity:0;transform:translateY(40px);}
.gallery-item.is-visible{opacity:1;transform:translateY(0);transition:opacity 0.6s ease,transform 0.6s ease;}
.gallery-item:hover{transform:scale(1.015);}
.gallery-item img{width:100%;height:auto;display:block;}
.bottom-back{text-align:center;margin-top:60px;}
footer{border-top:1px solid rgba(255,255,255,0.08);padding:24px;text-align:center;font-size:13px;color:rgba(255,255,255,0.3);}
footer a{color:rgba(255,255,255,0.3);transition:color 0.3s;}
footer a:hover{color:#9cff3f;}
.lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;}
.lightbox.is-open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:12px;}
.lightbox-close{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.lightbox-close:hover{background:rgba(255,255,255,0.2);}
.lightbox-arrow{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.lightbox-arrow:hover{background:rgba(255,255,255,0.2);}
.lightbox-arrow.left{left:20px;}
.lightbox-arrow.right{right:20px;}
.lightbox-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:0.875rem;letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>
<nav>
  <a href="home.html" class="nav-logo">马明宇</a>
  <div class="nav-links">
    <a href="home.html">首页</a>
    <a href="works.html" class="active">作品集</a>
    <a href="about.html">关于我</a>
  </div>
  <button class="hamburger" id="hamburger" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="home.html">首页</a>
  <a href="works.html" class="active">作品集</a>
  <a href="about.html">关于我</a>
</div>
<section class="detail">
  <a href="works.html" class="back-link"><span class="arrow">&larr;</span> 返回作品集</a>
  <h1>包装设计</h1>
  <span class="tag-pill">包装设计</span>
  <div class="cover"><img src="https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/packaging-design.png" alt="包装设计" loading="lazy" /></div>
  <div class="gallery anim-section">
            <div class="gallery-item"><img src="https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/packaging-design-1.png" alt="包装设计" loading="lazy" /></div>
            <div class="gallery-item"><img src="https://cdn.jsdelivr.net/gh/mamingyu24-byte/ma-mingyu-portfolio@main/assets/packaging-design-2.png" alt="包装设计" loading="lazy" /></div>
  </div>
  <div class="bottom-back"><a href="works.html" class="back-link"><span class="arrow">&larr;</span> 返回作品集</a></div>
</section>
<footer>
  <p>&copy; 2025 马明宇 All Rights Reserved &nbsp;|&nbsp; <a href="mailto:2536260106@stu.zjhzcc.edu.cn">2536260106@stu.zjhzcc.edu.cn</a></p>
</footer>
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">&times;</button>
  <button class="lightbox-arrow left" id="lbPrev">&#8249;</button>
  <button class="lightbox-arrow right" id="lbNext">&#8250;</button>
  <img src="" alt="Preview" id="lbImg" />
  <div class="lightbox-counter" id="lbCounter"></div>
</div>
<script>
(function(){
  var bar=document.getElementById('scrollProgress');
  window.addEventListener('scroll',function(){var s=window.pageYOffset||document.documentElement.scrollTop;var h=document.documentElement.scrollHeight-document.documentElement.clientHeight;bar.style.width=h>0?(s/h*100)+'%':'0%';});
  var sections=document.querySelectorAll('.anim-section');
  if(sections.length){var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var items=e.target.querySelectorAll('.gallery-item');items.forEach(function(item,i){setTimeout(function(){item.classList.add('is-visible');},i*80);});io.unobserve(e.target);}});},{threshold:0.1});sections.forEach(function(s){io.observe(s);});}
  var burger=document.getElementById('hamburger');
  var menu=document.getElementById('mobileMenu');
  burger.addEventListener('click',function(){burger.classList.toggle('is-open');menu.classList.toggle('is-open');});
  menu.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){burger.classList.remove('is-open');menu.classList.remove('is-open');});});
  var lb=document.getElementById('lightbox');
  var lbImg=document.getElementById('lbImg');
  var lbClose=document.getElementById('lbClose');
  var lbPrev=document.getElementById('lbPrev');
  var lbNext=document.getElementById('lbNext');
  var lbCounter=document.getElementById('lbCounter');
  var imgs=Array.from(document.querySelectorAll('.cover img, .gallery-item img'));
  var srcs=imgs.map(function(i){return i.src;});
  var idx=0;
  function show(i){idx=(i+srcs.length)%srcs.length;lbImg.src=srcs[idx];lbCounter.textContent=(idx+1)+' / '+srcs.length;}
  imgs.forEach(function(img,i){img.style.cursor='zoom-in';img.addEventListener('click',function(){idx=i;lbImg.src=img.src;lbCounter.textContent=(i+1)+' / '+srcs.length;lb.classList.add('is-open');});});
  lbPrev.addEventListener('click',function(e){e.stopPropagation();show(idx-1);});
  lbNext.addEventListener('click',function(e){e.stopPropagation();show(idx+1);});
  lbClose.addEventListener('click',function(e){e.stopPropagation();lb.classList.remove('is-open');});
  lb.addEventListener('click',function(e){if(e.target===lb)lb.classList.remove('is-open');});
  document.addEventListener('keydown',function(e){if(!lb.classList.contains('is-open'))return;if(e.key==='Escape')lb.classList.remove('is-open');if(e.key==='ArrowLeft')show(idx-1);if(e.key==='ArrowRight')show(idx+1);});
})();
</script>
</body>
</html>
