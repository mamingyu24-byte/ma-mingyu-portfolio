<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="3D Spiral Gallery powered by Three.js" />
    <title>马明宇 | 视觉传达设计师</title>
    <script type="module" crossorigin src="assets/index-DeRxF80t.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-DwQhUHiD.css">
  </head>
  <body>
    <div id="root"></div>

    <style>
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeSlideLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    .info-overlay .info-name{animation:fadeSlideLeft .8s .5s cubic-bezier(.16,1,.3,1) both}
    .info-overlay .info-role{animation:fadeSlideLeft .8s .7s cubic-bezier(.16,1,.3,1) both}
    .info-overlay .info-desc{animation:fadeSlideLeft .8s .9s cubic-bezier(.16,1,.3,1) both}
    .info-overlay .info-bottom-l{animation:fadeSlideUp .6s 1.2s cubic-bezier(.16,1,.3,1) both}
    .info-overlay .info-bottom-r{animation:fadeSlideUp .6s 1.4s cubic-bezier(.16,1,.3,1) both}
    @media(max-width:768px){
      .info-overlay .info-name{font-size:28px !important;letter-spacing:-1px !important}
      .info-overlay .info-role{font-size:11px !important;letter-spacing:2px !important}
      .info-overlay .info-desc{font-size:11px !important;max-width:200px !important}
      .info-overlay .info-bottom-l,.info-overlay .info-bottom-r{font-size:9px !important}
    }
    </style>
    <!-- Designer Info Overlay -->
    <div class="info-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100;">
      <!-- Top-left: Name + Role -->
      <div style="position:absolute;top:40px;left:40px;">
        <div class="info-name" style="font-family:system-ui,-apple-system,sans-serif;font-size:42px;font-weight:500;letter-spacing:-2px;color:#f2f0e8;line-height:1.1;">马明宇</div>
        <div class="info-role" style="font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:400;letter-spacing:4px;color:#9cff3f;margin-top:12px;text-transform:uppercase;opacity:0.85;">Visual Communication Designer</div>
        <div class="info-desc" style="font-family:system-ui,-apple-system,sans-serif;font-size:12px;font-weight:300;letter-spacing:1px;color:rgba(242,240,232,0.4);margin-top:20px;max-width:280px;line-height:1.7;">专注于品牌设计、IP设计、字体设计<br>及 UI/UX 领域的视觉传达设计师</div>
      </div>
      <!-- Bottom-left: Status line -->
      <div class="info-bottom-l" style="position:absolute;bottom:40px;left:40px;font-family:system-ui,-apple-system,sans-serif;font-size:11px;letter-spacing:3px;color:rgba(242,240,232,0.25);text-transform:uppercase;">Portfolio 2025 &mdash; Scroll to Explore</div>
      <!-- Bottom-right: Year -->
      <div class="info-bottom-r" style="position:absolute;bottom:40px;right:40px;font-family:system-ui,-apple-system,sans-serif;font-size:11px;letter-spacing:2px;color:rgba(242,240,232,0.2);">© 2025 Ma Mingyu</div>
    </div>

    <a href="../pages/home.html" style="position:fixed;right:40px;top:50%;transform:translateY(-50%);z-index:9999;display:inline-flex;align-items:center;gap:6px;padding:16px 32px;background:rgba(156,255,63,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(156,255,63,0.2);border-radius:50px;color:#9cff3f;font-size:14px;font-weight:500;letter-spacing:1px;text-decoration:none;font-family:system-ui,-apple-system,sans-serif;transition:all .3s ease;animation:breathe 3s ease-in-out infinite;" onmouseover="this.style.background='rgba(156,255,63,0.15)';this.style.borderColor='rgba(156,255,63,0.4)';this.style.boxShadow='0 0 30px rgba(156,255,63,0.1)'" onmouseout="this.style.background='rgba(156,255,63,0.08)';this.style.borderColor='rgba(156,255,63,0.2)';this.style.boxShadow='none'">进入主页 →</a>
<style>@keyframes breathe{0%,100%{border-color:rgba(156,255,63,0.2)}50%{border-color:rgba(156,255,63,0.45)}}</style>
  </body>
</html>
